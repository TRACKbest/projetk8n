services:
  mongo:
    image: mongo:7
    container_name: userhub-mongo
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    networks:
      - userhub
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: userhub-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/usersdb
      CORS_ORIGIN: http://localhost:3000,http://localhost
      LOG_LEVEL: info
    # Expose backend internally; only the frontend (nginx) is published.
    expose:
      - "5000"
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      userhub:
        # Alias matches the K8s Service name used by nginx.conf
        aliases:
          - backend-service

  frontend:
    build:
      context: ./frontend
      # Empty = frontend calls same origin; nginx proxies /api to backend.
      args:
        REACT_APP_API_URL: ""
    container_name: userhub-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - userhub

networks:
  userhub:
    driver: bridge

volumes:
  mongo-data:
